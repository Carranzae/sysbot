# 🐳 Docker Compose for Bot SAS Platform
# Complete production-ready stack

version: '3.8'

services:
  # ==========================================
  # 🚀 Backend API
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bot-sas-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bot_sas?schema=public
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env.production
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bot-sas-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # 🗄️ PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: bot-sas-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bot_sas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - bot-sas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 🚀 Redis Cache & Sessions
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: bot-sas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bot-sas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================
  # 📊 PGAdmin (Database Management)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bot-sas-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@botsas.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - bot-sas-network

  # ==========================================
  # 🔍 Redis Commander (Redis Management)
  # ==========================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: bot-sas-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - bot-sas-network

# ==========================================
# 📦 Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

# ==========================================
# 🌐 Networks
# ==========================================
networks:
  bot-sas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
